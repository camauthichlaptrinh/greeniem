app = 'greeniem'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Overwrite with the deployed backend's URL, e.g. https://axum-greeniem.fly.dev
  API_BASE = 'https://axum-greeniem.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
