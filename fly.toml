# fly.toml app configuration file generated for greeniem on 2026-07-10T21:32:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'greeniem'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  API_BASE = 'https://axum-greeniem.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
