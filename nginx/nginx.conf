server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;
    gzip_min_length 1024;

    # Runtime-generated backend URL — must never be cached.
    location = /env.js {
        add_header Cache-Control "no-store";
        try_files $uri =204;
    }

    location ~* \.(?:js|wasm|css|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves index.html so yew-router can
    # handle client-side routes like /san-pham/:slug or /admin/don-hang.
    # index.html references hashed asset filenames, so it must never be
    # cached — otherwise browsers can keep serving a stale build forever.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
